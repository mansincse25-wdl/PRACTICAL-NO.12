<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Showroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<style>
  body {
    background-color:#f5f5dc; /* light modern background */
  }
</style>
</style>

</head>
<body>
    <!-- Navbar -->

<nav class="navbar navbar-light bg-white">
  <div class="container-fluid">
    <a class="navbar-brand">CARSZONE</a>
    <form class="d-flex">
      <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
      <button class="btn btn-outline-success" type="submit">Search</button>
    </form>
  </div>
</nav>
<!-- Carousel -->

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://images.pexels.com/photos/3764984/pexels-photo-3764984.jpeg?cs=srgb&dl=pexels-svjae-3764984.jpg&fm=jpg" class="d-block w-100" style="height:400px; object-fit:cover;" alt="Luxury Cars">
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c" class="d-block w-100" style="height:400px; object-fit:cover;" alt="Sports Cars">
    </div>
    <div class="carousel-item">
      <img src="https://w3.pngaura.com/assets/images/posts/original/67b4da576eec9_2-(1859).jpg" class="d-block w-100" style="height:400px; object-fit:cover;" alt="Cars">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>


</body>
</html>
